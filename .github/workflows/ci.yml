name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Lint
        run: npm run lint:ci
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}

      - name: Test
        run: npm run test:ci

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    # Required repository secrets (Settings → Secrets → Actions):
    #   E2E_DATABASE_URL              — Neon branch connection string (see .env.e2e.example)
    #   NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY
    #   NUXT_CLERK_SECRET_KEY
    #   NUXT_GOOGLE_CLIENT_ID
    #   NUXT_GOOGLE_CLIENT_SECRET
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        run: npm run e2e
        env:
          E2E_DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NUXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NUXT_CLERK_SECRET_KEY: ${{ secrets.NUXT_CLERK_SECRET_KEY }}
          NUXT_GOOGLE_CLIENT_ID: ${{ secrets.NUXT_GOOGLE_CLIENT_ID }}
          NUXT_GOOGLE_CLIENT_SECRET: ${{ secrets.NUXT_GOOGLE_CLIENT_SECRET }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/report/
          retention-days: 7
